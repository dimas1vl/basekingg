<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waypoint Line Gradient</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        body {
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.60) 0%,
                rgba(255, 255, 255, 0.55) 12%,
                rgba(255, 255, 255, 0.42) 42%,
                rgba(255, 255, 255, 0.22) 72%,
                rgba(255, 255, 255, 0.06) 90%,
                rgba(255, 255, 255, 0.0) 100%
            );
        }
    </style>
</head>
<body></body>
</html>
